services:
  backend:
    container_name: lesson_booking_backend
    build: 
      context: ./backend
      dockerfile: Dockerfile.php.dev
    extra_hosts:
     - "host.docker.internal:host-gateway"
    volumes:
     - ./backend/:/var/www/
     - ./backend/storage/app:/var/www/storage/app/
     - ./backend/storage/logs:/var/www/storage/logs/
     - ./backend/public:/var/www/public
    networks:
      - lesson-booking-network
  frontend:
    container_name: lesson_booking_frontend
    build: 
      context: ./frontend
      dockerfile: Dockerfile.vite.dev
    user: "${UID:-1000}:${GID:-1000}"
    ports:
      - "3000:3000"
    command: sh -c "npm ci && npm run dev"
    volumes:
      - ./frontend/:/var/www/
      - frontend_node_modules:/var/www/node_modules
      - frontend_nuxt:/var/www/.nuxt
    networks:
      - lesson-booking-network
  nginx:
    container_name: lesson_booking_nginx
    build: 
      context: ./nginx
      dockerfile: Dockerfile.nginx.dev
    ports:
      - "80:80"
      - "9000:9000"
      - "5173:5173"
    volumes:
      - ./backend/:/var/www/
      - ./backend/storage/app:/var/www/storage/app/
      - ./backend/public:/var/www/public
    depends_on:
      - frontend
      - backend
    networks:
      - lesson-booking-network
networks:
  lesson-booking-network:
    external: true
volumes:
  frontend_node_modules:
  frontend_nuxt:
